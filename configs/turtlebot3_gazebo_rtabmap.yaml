input:
  mode: ros2
  source: /camera/image_raw
  camera_info_topic: /camera/camera_info
  width: 640
  height: 480
  fps: 30
  timeout_sec: 5.0

sim:
  platform: gazebo
  namespace: /
  camera_topic: /camera/image_raw
  camera_info_topic: /camera/camera_info
  clock_topic: /clock
  launch_package: turtlebot3_gazebo
  launch_file: turtlebot3_world.launch.py

camera:
  fx: 525.0
  fy: 525.0
  cx: 319.5
  cy: 239.5

depth:
  depth_model: midas
  device: cpu
  input_size: 518
  output_mode: relative_normalized
  weights_dir: models
  midas_variant: MiDaS_small
  depth_anything_encoder: vitl
  prefer_torch_hub: true

slam:
  mode: rtabmap
  frame_stride: 1
  pose_topic: /rtabmap/localization_pose
  timeout_sec: 0.05

mapping:
  enabled: true
  representation: pointcloud
  max_points: 200000
  stride: 4
  export_path: data/outputs/turtlebot3_gazebo/frame_cloud.ply

ros2:
  enabled: true
  depth_topic: /atlas/depth
  pose_topic: /atlas/pose
  path_topic: /atlas/path
  pointcloud_topic: /atlas/pointcloud
  frame_id: turtlebot3_camera

output:
  save_rgb_snapshot: true
  save_depth_snapshot: true
  save_demo_video: true
  save_depth_video: false
  save_trajectory: true
  save_pointcloud: true
  output_dir: data/outputs/turtlebot3_gazebo
  demo_video_path: demo/videos/turtlebot3_gazebo_rtabmap.mp4
  visualize: true
