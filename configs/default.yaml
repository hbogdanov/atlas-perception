input:
  mode: webcam
  source: 0
  width: 640
  height: 480
  fps: 30
  timeout_sec: 5.0

camera:
  fx: 525.0
  fy: 525.0
  cx: 319.5
  cy: 239.5

depth:
  model: midas
  device: cpu
  input_size: 518
  output_mode: relative_normalized
  weights_dir: models
  midas_variant: MiDaS_small
  depth_anything_encoder: vitl
  prefer_torch_hub: true
  postprocess:
    enabled: true
    bilateral_filter: true
    bilateral_diameter: 7
    bilateral_sigma_color: 0.1
    bilateral_sigma_space: 7.0
    guided_refine: true
    guided_radius: 8
    guided_eps: 0.001
    temporal_fusion: false
    temporal_alpha: 0.7

slam:
  mode: disabled
  frame_stride: 1
  pose_topic: /rtabmap/localization_pose
  timeout_sec: 0.05

mapping:
  enabled: true
  representation: pointcloud
  max_points: 100000
  stride: 4
  export_path: data/outputs/frame_cloud.ply

ros2:
  enabled: false
  depth_topic: /atlas/depth
  pose_topic: /atlas/pose
  path_topic: /atlas/path
  pointcloud_topic: /atlas/pointcloud
  frame_id: atlas_camera

output:
  save_rgb_snapshot: false
  save_depth_snapshot: false
  save_demo_video: false
  save_depth_video: false
  save_trajectory: true
  save_pointcloud: true
  output_dir: data/outputs
  demo_video_path: data/outputs/atlas_demo.mp4
  demo_video_fps: 15
  demo_video_width: 1280
  demo_video_height: 720
  visualize: false
