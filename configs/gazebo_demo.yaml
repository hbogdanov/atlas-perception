input:
  mode: ros2
  source: /gazebo/camera/image_raw
  camera_info_topic: /gazebo/camera/camera_info
  width: 1280
  height: 720
  fps: 30
  timeout_sec: 5.0

sim:
  platform: gazebo
  namespace: /gazebo
  camera_topic: /gazebo/camera/image_raw
  camera_info_topic: /gazebo/camera/camera_info
  clock_topic: /clock
  launch_package: gazebo_ros
  launch_file: gazebo.launch.py

camera:
  fx: 700.0
  fy: 700.0
  cx: 640.0
  cy: 360.0

depth:
  depth_model: midas
  device: cpu
  input_size: 518
  output_mode: relative_normalized
  weights_dir: models
  midas_variant: MiDaS_small
  depth_anything_encoder: vitl
  prefer_torch_hub: true

slam:
  mode: dummy
  frame_stride: 1
  pose_topic: /rtabmap/localization_pose
  timeout_sec: 0.05

mapping:
  enabled: true
  representation: pointcloud
  max_points: 200000
  stride: 4
  export_path: data/outputs/gazebo/frame_cloud.ply

ros2:
  enabled: true
  depth_topic: /atlas/depth
  pose_topic: /atlas/pose
  path_topic: /atlas/path
  pointcloud_topic: /atlas/pointcloud
  frame_id: gazebo_camera

output:
  save_rgb_snapshot: true
  save_depth_snapshot: true
  save_demo_video: true
  save_depth_video: false
  save_trajectory: true
  save_pointcloud: true
  output_dir: data/outputs/gazebo
  demo_video_path: demo/videos/gazebo_demo.mp4
  visualize: true
