input:
  mode: webcam
  source: 0
  width: 640
  height: 480
  fps: 30

depth:
  input_size: 256
  postprocess:
    enabled: false

slam:
  mode: disabled
  pose_graph:
    enabled: false

mapping:
  representation: pointcloud
  stride: 3
  max_points: 100000

output:
  save_rgb_snapshot: false
  save_depth_snapshot: false
  save_demo_video: false
  save_trajectory: false
  save_pointcloud: true
  output_dir: data/outputs/webcam_mapping
  visualize: false
