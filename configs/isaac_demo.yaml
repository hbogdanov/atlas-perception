input:
  mode: ros2
  source: /isaac/camera/color
  width: 1280
  height: 720
  fps: 30
  timeout_sec: 5.0

sim:
  platform: isaac
  namespace: /isaac
  camera_topic: /isaac/camera/color
  camera_info_topic: /isaac/camera/camera_info
  clock_topic: /clock
  launch_package: isaac_ros_launch
  launch_file: isaac_sim.launch.py

camera:
  fx: 910.0
  fy: 910.0
  cx: 640.0
  cy: 360.0

depth:
  model: midas
  device: cpu
  input_size: 518
  output_mode: relative_normalized
  weights_dir: models
  midas_variant: MiDaS_small
  depth_anything_encoder: vitl
  prefer_torch_hub: true

slam:
  mode: dummy
  frame_stride: 1
  pose_topic: /rtabmap/localization_pose
  timeout_sec: 0.05

mapping:
  enabled: true
  representation: pointcloud
  max_points: 200000
  stride: 4
  export_path: data/outputs/isaac/frame_cloud.ply

ros2:
  enabled: true
  depth_topic: /atlas/depth
  pose_topic: /atlas/pose
  path_topic: /atlas/path
  pointcloud_topic: /atlas/pointcloud
  frame_id: isaac_camera

output:
  save_rgb_snapshot: true
  save_depth_snapshot: true
  save_depth_video: false
  save_trajectory: true
  save_pointcloud: true
  output_dir: data/outputs/isaac
  visualize: true
