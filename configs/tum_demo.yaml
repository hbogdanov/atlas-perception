input:
  mode: video
  source: data/outputs/tum_demo/tum_rgb_demo.mp4
  loop: true

slam:
  mode: dummy
  linear_step: 0.05
  lateral_amplitude: 0.28
  lateral_frequency: 0.11
  vertical_amplitude: 0.015
  vertical_frequency: 0.06
  yaw_rate: 0.025

ros2:
  enabled: false

output:
  save_rgb_snapshot: true
  save_depth_snapshot: true
  save_demo_video: true
  save_pointcloud: true
  save_trajectory: true
  output_dir: data/outputs/tum_demo_eval
  demo_video_path: demo/videos/tum_demo.mp4
