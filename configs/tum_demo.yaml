input:
  mode: rgbd_dataset
  source: data/samples/tum_freiburg1_xyz

semantics:
  enabled: true
  backend: yolov8_seg
  model: models/checkpoints/yolov8n-seg.pt
  device: cpu
  confidence: 0.2
  iou: 0.6

depth:
  source_mode: input
  output_mode: raw
  viz_min_depth: 0.3
  viz_max_depth: 4.0
  viz_blur_ksize: 3
  postprocess:
    enabled: false

slam:
  mode: groundtruth

mapping:
  representation: pointcloud
  stride: 2
  max_points: 150000

ros2:
  enabled: false

output:
  save_rgb_snapshot: true
  save_depth_snapshot: true
  save_demo_video: true
  save_pointcloud: true
  save_trajectory: true
  output_dir: data/outputs/tum_demo_eval
  demo_video_path: demo/videos/tum_demo.mp4
  demo_map_projection: xz
  demo_map_bounds: [-2.5, 2.5, -2.5, 2.5]
